name: Full Project CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Mobile Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --legacy-peer-deps
      - run: npm test -- --ci --coverage

  backend:
    name: Spring Boot Service Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: spring-boot-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew
      - name: Run tests and coverage
        run: ./gradlew clean test jacocoTestReport jacocoTestCoverageVerification --no-daemon
      - name: JaCoCo summary
        if: success() || failure()
        run: python3 "${{ github.workspace }}/.github/scripts/jacoco_step_summary.py" "${{ github.workspace }}/spring-boot-service/build/reports/jacoco/test/jacocoTestReport.xml"
      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: spring-boot-service/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend
          disable_search: true
          fail_ci_if_error: false
          name: spring-boot-service
      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html
